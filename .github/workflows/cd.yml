name: CD — Deploy to Linux Server

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/ml-platform

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    concurrency:
      group: deploy-${{ inputs.environment || 'production' }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy compose files to server
        run: |
          scp docker-compose.yml docker-compose.monitoring.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/ml-platform/

      - name: Copy monitoring configs
        run: |
          scp -r monitoring infra \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/ml-platform/

      - name: Deploy on remote server
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            set -euo pipefail
            cd ~/ml-platform

            # Pull latest images
            docker compose pull serving trainer

            # Rolling restart of serving (zero-downtime)
            docker compose up -d --no-deps --build serving

            # Reload monitoring stack
            docker compose -f docker-compose.yml -f docker-compose.monitoring.yml \
              up -d prometheus grafana loki promtail

            # Health check
            sleep 10
            curl -sf http://localhost/health || { echo "Health check failed"; exit 1; }

            echo "Deployment successful: $(date)"
          ENDSSH

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed for ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

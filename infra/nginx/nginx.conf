worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream serving_backend {
        server serving:8000;
        keepalive 32;
    }

    upstream mlflow_backend {
        server mlflow:5000;
        keepalive 16;
    }

    # ── API (port 80 → redirect to 443 in production) ─────────────────────────
    server {
        listen 80;
        server_name _;

        # Health probe (used by load balancers, no rate limiting)
        location /health {
            proxy_pass http://serving_backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # Prediction API
        location /api/v1/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://serving_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            add_header X-Request-ID $request_id always;
        }

        # MLflow UI (internal only — consider IP allowlist in production)
        location /mlflow/ {
            proxy_pass http://mlflow_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Basic auth placeholder
            # auth_basic "MLflow";
            # auth_basic_user_file /etc/nginx/.htpasswd;
        }

        # Deny everything else
        location / {
            return 404;
        }
    }
}
